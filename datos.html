<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Delius&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Dots&display=swap" rel="stylesheet">
    <title>Catálogo</title>
</head>

<body class="autosbody">
    <header>
        <a href="pulseras.html"><img src="flecha-izquierda.png" alt="Volver"></a>
    </header>

    <section class="titulo">
        <div>
            <h1>Ya casi!</h1>
        </div>
    </section>

    <!-- CONTENEDOR PRINCIPAL EN DOS COLUMNAS -->
    <main class="checkout-container">
        
        <!-- COLUMNA IZQUIERDA: RESUMEN DE PRODUCTOS -->
        <div class="columna-resumen">
            <h2>Tu Pedido</h2>
            <div id="carrito">
                <!-- Aquí JavaScript inyecta las tarjetas 'final-carrito-section' -->
            </div>
        </div>

        <!-- COLUMNA DERECHA: FORMULARIO Y TOTAL -->
        <div class="columna-formulario">
            <div class="cliente">
                <div class="total-box">
                    <p>Monto Estimado</p>
                    <h2 id="totalCarrito">Total: $0</h2>
                </div>
                
                <input type="text" id="clienteNombre" placeholder="Nombre y apellido" required>
                <input type="tel" id="clienteTelefono" placeholder="Teléfono" required>
                <input type="text" id="clienteProvincia" placeholder="Provincia" required>
                <input type="text" id="clienteDireccion" placeholder="Dirección" required>
                
                <button onclick="enviarWhatsApp()">Enviar por WhatsApp</button>
            </div>
        </div>

    </main>

    <div id="mensaje" class="notificacion-flotante"></div>
    <script src="script.js" defer></script>
</body>



</html>
