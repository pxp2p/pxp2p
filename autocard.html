<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Dots&display=swap" rel="stylesheet">
    <title>Detalle del Auto</title>
</head>
<body id="detalleAutoBody">
    <header>
        <a href="Autos.html"><img src="flecha-izquierda.png" alt="Volver"></a>
    </header>

    <main class="detalle-auto-container">
        <section class="titulo">
            <h2 class="teinteresa-card"> ¿Te interesa este auto? </h2>
        </section>

        <section class="auto-detalle-contenido">
            <img id="detalleImagen" src="" alt="" class="auto-detalle-img">
            
            <div class="auto-detalle-info">
                <h1 id="detalleNombre">Cargando...</h1>
                <p id="detallePotencia"><strong>Potencia:</strong> -- HP</p>
                <p id="detallePrecio"><strong>Precio:</strong> $--</p>
                <p id="detalleDescripcion" class="auto-detalle-desc"></p>
                
                <div id="contenedorBotonComprar"></div>
            </div>
        </section>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
